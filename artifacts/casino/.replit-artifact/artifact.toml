kind = "web"
previewPath = "/"
title = "CryptoStake Casino"
version = "1.0.0"
id = "artifacts/casino"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22412

[services.development]
run = "pnpm --filter @workspace/casino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/casino", "run", "build" ]
publicDir = "artifacts/casino/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22412"
BASE_PATH = "/"
